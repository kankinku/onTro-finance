name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=50
        env:
          ONTRO_STORAGE_BACKEND: inmemory

      - name: Typecheck with basedpyright
        run: python -m basedpyright main.py src tests

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  starter-smoke:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test starter path
        env:
          ONTRO_LOAD_SAMPLE_DATA: "false"
          ONTRO_COUNCIL_AUTO_ENABLED: "false"
        run: |
          python onTroFinanceStarter.py --host 127.0.0.1 --port 8010 --no-browser > starter.log 2>&1 &
          starter_pid=$!
          trap 'kill "$starter_pid" || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8010/healthz > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -f http://127.0.0.1:8010/healthz
          curl -f http://127.0.0.1:8010/status

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend, starter-smoke]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ontro-finance:${{ github.sha }} .

      - name: Smoke test /healthz
        run: |
          docker run -d --name ontro-test \
            -p 8000:8000 \
            -e ONTRO_STORAGE_BACKEND=inmemory \
            -e ONTRO_LOAD_SAMPLE_DATA=false \
            -e ONTRO_API_KEY_ADMIN=ci-admin \
            -e ONTRO_API_KEY_OPERATOR=ci-operator \
            -e ONTRO_JSON_LOGS=true \
            ontro-finance:${{ github.sha }}
          sleep 15
          curl -f http://localhost:8000/healthz || (docker logs ontro-test && exit 1)
          curl -f http://localhost:8000/status || (docker logs ontro-test && exit 1)
          curl -f http://localhost:8000/metrics || (docker logs ontro-test && exit 1)
          curl -f -H "x-api-key: ci-operator" http://localhost:8000/api/audit/logs || (docker logs ontro-test && exit 1)
          docker stop ontro-test
