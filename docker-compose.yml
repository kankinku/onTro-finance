services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ONTRO_STORAGE_BACKEND=neo4j
      - ONTRO_NEO4J_URI=bolt://neo4j:7687
      - ONTRO_NEO4J_USER=neo4j
      - ONTRO_NEO4J_PASSWORD=password
      - ONTRO_NEO4J_DATABASE=neo4j
      - ONTRO_REDIS_URL=${ONTRO_REDIS_URL:-}
      - ONTRO_APP_HOME=/app
      - ONTRO_LOAD_SAMPLE_DATA=false
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ontro_app_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    profiles: ["distributed"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  neo4j_data:
  ontro_app_data:
  prometheus_data:
  grafana_data:
