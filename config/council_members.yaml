# `model_name`을 지정하면 해당 멤버는 그 모델을 사용합니다.
# `model_name`을 생략하면 provider healthcheck(`/models`, `/api/tags`)에서 찾은 목록으로
# 같은 provider 안에서 가능한 한 서로 다른 모델을 자동 배정합니다.
members:
  - member_id: proposer-openai
    role: proposer
    provider: openai_gpt_sdk
    model_name: gpt-4.1
    enabled: true
    auth:
      auth_type: api_key
      base_url: https://api.openai.com/v1
      healthcheck_path: /models
      api_key_env: OPENAI_API_KEY

  - member_id: challenger-copilot
    role: challenger
    provider: github_copilot_oauth_app
    model_name: copilot-gpt
    enabled: true
    auth:
      auth_type: oauth_app
      base_url: https://copilot.example.internal
      healthcheck_path: /models
      access_token_env: GITHUB_COPILOT_ACCESS_TOKEN
      client_id_env: GITHUB_COPILOT_CLIENT_ID
      client_secret_env: GITHUB_COPILOT_CLIENT_SECRET

  - member_id: auditor-local
    role: evidence_auditor
    provider: ollama
    model_name: llama3.2
    enabled: true
    auth:
      auth_type: none
      base_url: http://localhost:11434
      healthcheck_path: /api/tags
