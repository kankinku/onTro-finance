# Storage Configuration
storage:
  backend: "neo4j"  # neo4j | inmemory (override to inmemory for local/debug/tests)
  
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    password: "password"
    database: "neo4j"

# LLM Configuration
llm:
  backend: "ollama"  # ollama | openai | mock
  
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.2"
    timeout: 30
  
  openai:
    # OpenClaw-style pattern: keep credential references in config,
    # resolve the actual secret from env at runtime.
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    timeout: 60
    auth:
      auth_type: "api_key"
      api_key_env: "OPENAI_API_KEY"
      healthcheck_path: "/models"
