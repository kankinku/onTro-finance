semantic_patterns:
  exaggeration:
    - "반드시"
    - "무조건"
    - "always"
    - "never"
    - "guaranteed"
    - "must"

  correlation_as_causation:
    - "함께"
    - "동행"
    - "상관"
    - "correlates"
    - "moves with"
    - "associated with"

  weak_evidence:
    - "가능성"
    - "보인다"
    - "일 수 있다"
    - "may"
    - "might"
    - "could"
    - "appears"
    - "suggests"
