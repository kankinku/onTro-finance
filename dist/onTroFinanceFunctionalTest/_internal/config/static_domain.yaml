    - "상승"
    - "증가"
    - "강세"
    - "지원"
    - "수혜"
    - "rise"
    - "rises"
    - "higher"
    - "increase"
    - "increases"
    - "boost"
    - "support"
    - "supports"
    - "benefit"
    - "benefits"
    - "stronger"
    - "wider"

  negative:
    - "하락"
    - "감소"
    - "압박"
    - "약세"
    - "둔화"
    - "fall"
    - "falls"
    - "lower"
    - "decline"
    - "declines"
    - "pressure"
    - "pressures"
    - "drag"
    - "drags"
