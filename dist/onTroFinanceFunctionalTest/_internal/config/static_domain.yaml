static_rules:
  - rule_id: FIN_001
    head: Policy_Rate
    tail: Government_Bonds
    relation: affects
    polarity: "-"
    certainty: 0.98
    description: "Higher policy rates generally pressure government bond prices."

  - rule_id: FIN_002
    head: Policy_Rate
    tail: Growth_Stocks
    relation: pressures
    polarity: "-"
    certainty: 0.97
    description: "Higher policy rates generally pressure growth equity valuations."

  - rule_id: FIN_003
    head: Crude_Oil
    tail: Airlines_Sector
    relation: pressures
    polarity: "-"
    certainty: 0.96
    description: "Higher oil prices generally pressure airline margins."

  - rule_id: FIN_004
    head: Crude_Oil
    tail: Energy_Sector
    relation: supports
    polarity: "+"
    certainty: 0.95
    description: "Higher oil prices generally support energy producers."

  - rule_id: FIN_005
    head: CPI
    tail: Policy_Rate
    relation: signals
    polarity: "+"
    certainty: 0.92
    description: "Sticky inflation often signals higher-for-longer policy."

  - rule_id: FIN_006
    head: Real_Yields
    tail: Gold
    relation: affects
    polarity: "-"
    certainty: 0.90
    description: "Higher real yields generally weigh on gold."

sign_patterns:
