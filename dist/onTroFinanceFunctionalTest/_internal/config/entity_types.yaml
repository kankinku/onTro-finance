# Entity types for the finance v1 baseline

entity_types:
  MacroIndicator:
    description: "Macro variable or market-wide indicator."
    examples:
      - "policy rate"
      - "CPI"
      - "real yields"
      - "credit spreads"
    subtypes:
      - Rate
      - Inflation
      - Growth
      - Liquidity
      - Credit

  AssetGroup:
    description: "Broad asset class or equity style bucket."
    examples:
      - "growth stocks"
      - "government bonds"
      - "gold"
      - "equities"
    subtypes:
      - EquityStyle
      - FixedIncome
      - CommodityAsset
      - BroadAsset

  Sector:
    description: "Industry or sector grouping."
    examples:
      - "energy sector"
      - "airlines sector"
      - "financials"
    subtypes:
      - EquitySector
      - IndustryGroup

  Policy:
    description: "Policy action, policy stance, or regulatory action."
    examples:
      - "tightening"
      - "rate cuts"
      - "fiscal stimulus"
    subtypes:
      - MonetaryPolicy
      - FiscalPolicy
      - RegulatoryAction

  Commodity:
    description: "Commodity or commodity benchmark."
    examples:
      - "crude oil"
      - "natural gas"
      - "copper"
    subtypes:
      - Energy
      - Metal
      - Agricultural

  Currency:
    description: "Currency or currency basket."
    examples:
      - "US dollar"
      - "JPY"
      - "KRW"
    subtypes:
      - ReserveCurrency
      - LocalCurrency
      - CurrencyIndex

  MarketMetric:
    description: "Market-based metric such as valuation, spreads, or volatility."
    examples:
      - "valuation multiples"
      - "risk premium"
      - "volatility"
    subtypes:
      - Valuation
      - Spread
      - Volatility
      - Sentiment

  Institution:
    description: "Institution, central bank, or policy body."
    examples:
      - "Fed"
      - "ECB"
      - "Bank of Korea"
    subtypes:
      - CentralBank
      - Government
      - ResearchHouse

  Theme:
    description: "Abstract financial theme or state."
    examples:
      - "liquidity"
      - "risk aversion"
      - "disinflation"
    subtypes:
      - Regime
      - SentimentState
      - MacroTheme
