validation_rules:
  allowed_combinations:
    - head_type: MacroIndicator
      tail_type: AssetGroup
      relations: [affects, leads_to, pressures, supports, signals, priced_in, correlates_with]
    - head_type: MacroIndicator
      tail_type: Sector
      relations: [affects, leads_to, pressures, supports, signals, correlates_with]
    - head_type: MacroIndicator
      tail_type: MacroIndicator
      relations: [affects, leads_to, signals, correlates_with, depends_on, revises]
    - head_type: MacroIndicator
      tail_type: Theme
      relations: [affects, leads_to, signals, supports, pressures]

    - head_type: Policy
      tail_type: MacroIndicator
      relations: [affects, leads_to, signals, revises]
    - head_type: Policy
      tail_type: AssetGroup
      relations: [affects, pressures, supports, reprices]
    - head_type: Policy
      tail_type: Sector
      relations: [affects, pressures, supports]

    - head_type: Commodity
      tail_type: Sector
      relations: [affects, pressures, supports, correlates_with]
    - head_type: Commodity
      tail_type: AssetGroup
      relations: [affects, supports, pressures, correlates_with]

    - head_type: Currency
      tail_type: AssetGroup
      relations: [affects, supports, pressures, correlates_with]
    - head_type: Currency
      tail_type: Sector
      relations: [affects, supports, pressures]
    - head_type: Currency
      tail_type: Commodity
      relations: [affects, correlates_with]

    - head_type: Sector
      tail_type: Commodity
      relations: [exposed_to, depends_on]
    - head_type: Sector
      tail_type: MacroIndicator
      relations: [depends_on, exposed_to]

    - head_type: AssetGroup
      tail_type: MacroIndicator
      relations: [depends_on, correlates_with, hedges]
    - head_type: AssetGroup
      tail_type: AssetGroup
      relations: [correlates_with, hedges, offsets, belongs_to]

    - head_type: Theme
      tail_type: AssetGroup
      relations: [affects, pressures, supports, signals]
    - head_type: Theme
      tail_type: MacroIndicator
      relations: [affects, signals, revises]

    - head_type: Institution
      tail_type: Policy
      relations: [signals, confirms, revises]
    - head_type: Institution
      tail_type: MacroIndicator
      relations: [signals, affects]

  forbidden_combinations:
    - head_type: AssetGroup
      tail_type: Policy
      relations: [leads_to, revises]
      reason: "Asset groups should not directly define policy actions."
    - head_type: Sector
      tail_type: Policy
      relations: [leads_to]
      reason: "Sector performance should not directly cause policy in baseline rules."
    - head_type: Commodity
      tail_type: Institution
      relations: [belongs_to, leads_to]
      reason: "Commodity to institution causation is out of scope for v1."

  confidence_thresholds:
    domain_candidate: 0.60
    personal_candidate: 0.40
    drop: 0.0

  confidence_weights:
    student_conf: 0.4
    sign_score: 0.25
    semantic_conf: 0.35
