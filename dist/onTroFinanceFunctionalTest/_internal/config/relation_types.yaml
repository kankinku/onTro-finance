# Relation types for the finance v1 baseline

relation_types:
  affects:
    description: "A broadly influences B."
    has_polarity: true
    examples:
      - "Higher rates affect equity multiples."
      - "A stronger dollar affects commodities."

  leads_to:
    description: "A directly drives or causes B."
    has_polarity: true
    examples:
      - "Tighter liquidity leads to lower multiples."

  pressures:
    description: "A places directional pressure on B."
    has_polarity: true
    examples:
      - "Higher oil prices pressure airline margins."

  supports:
    description: "A supports or benefits B."
    has_polarity: true
    examples:
      - "Lower real yields support gold."

  priced_in:
    description: "A is already reflected in B."
    has_polarity: false
    examples:
      - "Rate cuts are already priced in for bonds."

  reprices:
    description: "A causes market repricing of B."
    has_polarity: true
    examples:
      - "The policy surprise reprices bond expectations."

  signals:
    description: "A signals or points to B."
    has_polarity: true
    examples:
      - "Wider spreads signal risk aversion."

  correlates_with:
    description: "A moves with B without asserting strong causality."
    has_polarity: false
    examples:
      - "Real yields often correlate with gold."

  hedges:
    description: "A helps hedge the risk in B."
    has_polarity: false
    examples:
      - "Gold hedges inflation risk."

  offsets:
    description: "A offsets part of the impact of B."
    has_polarity: true
    examples:
      - "Subsidies offset input cost pressure."

  belongs_to:
    description: "A belongs to B."
    has_polarity: false
    examples:
      - "Airlines belong to the industrials universe."

  exposed_to:
    description: "A is structurally exposed to B."
    has_polarity: false
    examples:
      - "Airlines are exposed to crude oil."

  depends_on:
    description: "A materially depends on B."
    has_polarity: false
    examples:
      - "Growth stock valuation depends on discount rates."

  confirms:
    description: "A confirms an existing interpretation or relation."
    has_polarity: false

  contradicts:
    description: "A contradicts an existing interpretation or relation."
    has_polarity: false

  revises:
    description: "A revises an existing interpretation or relation."
    has_polarity: false
